env: dev
region: us-east-1
user_id: hjsong
project: titanic-survival-prediction
experiment: tuned-hjsong-v1
model: passenger-survival-classifier
version: v1.5
kernel_name: boilerplate312
image_tag: hjsong-v1.5
s3:
  conf_bucket: gs-retail-awesome-conf-us-east-1
  data_bucket: gs-retail-awesome-data-us-east-1
  model_bucket: gs-retail-awesome-model-us-east-1
s3_paths:
  conf: '{env}/{user_id}/{project}/{experiment}/'
  data: '{env}/{user_id}/{project}/{version}/'
  model: '{env}/{user_id}/{project}/{experiment}/{run_id}/'
local:
  root: run_pm
  input_dir: input
  output_dir: output
  output_subdirs:
  - metadata
  - config
  - data_refs
  - artifacts/model
  - artifacts/metrics
  - artifacts/charts
  - artifacts/explainability
  - reports
