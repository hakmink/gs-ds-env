features:
  index_col: PassengerId
  numeric_col:
  - Age
  - Fare
  - SibSp
  - Parch
  drop_col:
  - Name
  - Ticket
  - Cabin
  categorical_col:
  - Pclass
  - Embarked
  target_col: Survived
feature_engineering:
  derived_features:
  - name: FamilySize
    formula: SibSp + Parch + 1
  - name: IsAlone
    formula: 1 if FamilySize == 1 else 0
  - name: FarePerPerson
    formula: Fare / FamilySize
  - name: AgeGroup
    formula: pd.cut(Age, bins=[0,12,18,35,60,100], labels=['Child','Teen','Adult','Middle','Senior'])
data:
  seed: 2026
  train_valid_split: 0.2
  stratify: true
preprocessing:
  missing_values:
    Embarked: mode
    Age: median
    Fare: median
  encoding:
    Embarked: onehot
    Pclass: ordinal
    Sex: label
  scaling:
    method: standard
    columns:
    - Age
    - Fare
class_weight:
  method: balanced
  enabled: true
report:
  type: classification_summary
  include_sections:
  - executive_summary
  - data_overview
  - model_performance
  - confusion_matrix
  - feature_importance
  - roc_auc_curve
  - recommendations
hyperparameters:
  bagging_fraction: 0.8
  bagging_freq: 5
  boosting: gbdt
  metric:
  - auc
  - binary_logloss
  - binary_error
  max_depth: 6
  num_iterations: 200
  feature_fraction: 0.8
  num_leaves: 31
  min_data_in_leaf: 20
  learning_rate: 0.05
  verbosity: 1
  objective: binary
algorithm:
  name: lightgbm
  suffix: baseline
  task: classification
