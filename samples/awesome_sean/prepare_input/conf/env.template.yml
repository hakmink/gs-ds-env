# ============================================================
# env.yml - 인프라 / 환경 설정  ★ Source of Truth ★
#
# 변경 주기  : 거의 안 바뀜
# 관리 주체  : 인프라 / DevOps
# ※ region / env 두 값만 바꾸면 모든 하위 설정이 연동됩니다.
# ============================================================

env:    dev
region: us-west-2   # 리전 변경 시 이 값만 수정 → 전체 반영

# ── 실험 식별자 ──────────────────────────────────────────────
user_id:    sample   # (수정) 사용자 아이디
project:    titanic-survival-prediction
experiment: baseline-awesome-sean-v1
model:      passenger-survival-classifier
version:    v1.0

# ── ECR ──────────────────────────────────────────────
kernel_name:       boilerplate312
image_tag:      sean-v2.0


# ── S3 버킷 ──────────────────────────────────────────────────
# ※ 버킷명은 conf_loader.py 가 region 값을 이용해 자동 조합합니다.
#   명시적으로 override 하고 싶은 경우에만 아래 주석을 해제하세요.
s3:
  conf_bucket:  gs-retail-awesome-conf-{{ region }}
  data_bucket:  gs-retail-awesome-data-{{ region }}
  model_bucket: gs-retail-awesome-model-{{ region }}

# ── S3 경로 템플릿 ───────────────────────────────────────────
s3_paths:
  conf:  "{env}/{user_id}/{project}/{experiment}/"
  data:  "{env}/{user_id}/{project}/{version}/"
  model: "{env}/{user_id}/{project}/{experiment}/{run_id}/"

# ── 로컬 작업 디렉토리 ───────────────────────────────────────
local:
  root:       run_pm
  input_dir:  input
  output_dir: output
  output_subdirs:
    - metadata
    - config
    - data_refs
    - artifacts/model
    - artifacts/metrics
    - artifacts/charts
    - artifacts/explainability
    - reports
