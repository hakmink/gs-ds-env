env: dev
region: us-west-2
user_id: sample
project: titanic-survival-prediction
experiment: baseline-awesome-sean-v1
model: passenger-survival-classifier
version: v1.0
kernel_name: boilerplate312
image_tag: sean-v2.0
s3:
  conf_bucket: gs-retail-awesome-conf-us-west-2
  data_bucket: gs-retail-awesome-data-us-west-2
  model_bucket: gs-retail-awesome-model-us-west-2
s3_paths:
  conf: '{env}/{user_id}/{project}/{experiment}/'
  data: '{env}/{user_id}/{project}/{version}/'
  model: '{env}/{user_id}/{project}/{experiment}/{run_id}/'
local:
  root: run_pm
  input_dir: input
  output_dir: output
  output_subdirs:
  - metadata
  - config
  - data_refs
  - artifacts/model
  - artifacts/metrics
  - artifacts/charts
  - artifacts/explainability
  - reports
