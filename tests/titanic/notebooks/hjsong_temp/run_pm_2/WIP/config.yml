WANDB:
  project: gsp-oos-daos-dev-sagemaker
  secret_name: gsp-oos-wandb-sean
  region_name: ap-northeast-2
  infra: AWS
  job_type: train-model
  algorithm_name: lightgbm
  model_suffix: base
  tags:
  - lightgbm-base
  - tr2209_te2305_inf2308
  - base
S3STORAGE:
  region_name: ap-northeast-2
  bucket_name: gsp-oos-cdk-prod-datalake #-- cdk change
  target_key: curated/daos_pred
ATHENA:
  database_name: gsp-oos-cdk-prod-db #-- cdk change
  daos_table: conformed_daos_data
  first_bidding_table: conformed_first_bid_data
  generation_unit_price_table: conformed_generation_price_data # 업데이트 필요 (from mssql) conformed_gen_unit_price_data
  lng_kogas_table: conformed_fuelcost_data
  coal_price_table: conformed_coal_weighted_data
  weather_table: conformed_weather_data # 서울 기준 데이터
  target_table: curated_daos_pred
  result_table: result_table
  retool_key_name: curated/retool/daos
  retool_table_name: curated_retool_daos

SEED: 202311
DATA:
  train_from: '2021-01-01'
  train_to: '2023-11-07'
  test_from: '2023-09-27'
  test_to: '2023-10-04'
  train_valid_split: 0.1
  equip_id: 1

FEATURES:
  index_col: datetime
  target_col: daos_value
  base_col:
  - ra_cc_apply
  - gen_price_normal
  - gen_price_const
  - lng_for_group_anyang
  - coal_weighted_avg
  - temp
  - max_temp
  - humidity
  - weekend
  - hour
  - work_time
  - holiday
  - holiday_before
  - holiday_after
  - weekday
  - working_day
  - working_day_before
  - working_day_after
  - season
  - discomfort_index
  - tmp_1hr_ago
  - tmp_1wk_ago
  - tmp_2wk_ago
  - hm_1hr_ago
  - hm_1wk_ago
  - hm_2wk_ago
  - ws_1hr_ago
  - ws_1wk_ago
  - ws_2wk_ago
  - discomfort_index_1hr_ago
  - discomfort_index_1wk_ago
  - discomfort_index_2wk_ago
  
HYPERPARAMS:
    objective: regression
    boosting: gbdt
    max_depth: 15
    learning_rate: 0.05
    num_leaves: 150
    feature_fraction: 0.9
    bagging_fraction: 0.8
    bagging_freq: 5
    verbosity: 1
    num_iterations: 500
    # min_data_in_leaf: 10
    metric:
        # - binary_logloss
        - rmse
        - l2
        - l1
        - huber
        
POST_PROCESSING:
  n_days:
    weekday: 14
    weekend: 28
  agg_col: hour