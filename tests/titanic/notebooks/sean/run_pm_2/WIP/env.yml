# ============================================================
# env.yml - 인프라 / 환경 설정
#
# 변경 주기  : 거의 안 바뀜
# 관리 주체  : 인프라 / DevOps
# S3 위치    : s3://gs-retail-awesome-config-ap-northeast-2/env/dev/env.yml
#
# ※ 모델·실험 관련 값은 meta.yml / model.yml 에서 관리
# ============================================================

env: dev   # dev | stg | prod

# ── S3 Input (데이터셋) ──────────────────────────────────────
input:
  region: ap-northeast-2
  bucket: gs-retail-awesome-data-ap-northeast-2

# ── S3 Output (모델 결과물) ──────────────────────────────────
output:
  region: ap-northeast-2
  bucket: gs-retail-awesome-model-ap-northeast-2

# ── Athena ───────────────────────────────────────────────────
athena:
  database_name: gs-retail-prod-db
  sales_table:   conformed_sales_data
  store_table:   conformed_store_data
  weather_table: conformed_weather_data
  target_table:  curated_sales_pred
  result_table:  result_table

# ── 로컬 작업 디렉토리 ───────────────────────────────────────
local:
  root:       run_pm
  input_dir:  input
  output_dir: output
  output_subdirs:
    - metadata
    - config
    - data_refs
    - artifacts/model
    - artifacts/metrics
    - artifacts/charts
    - artifacts/explainability
    - reports
