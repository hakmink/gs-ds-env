# ============================================================
# env.yml - 인프라 / 환경 설정
#
# 변경 주기  : 거의 안 바뀜
# 관리 주체  : 인프라 / DevOps
# S3 위치    : s3://gs-retail-awesome-conf-{region}/
#               {env}/{user_id}/{project}/{experiment}/env.yml
# ============================================================

env:    dev
region: us-west-1

# ── S3 버킷 ──────────────────────────────────────────────────
s3:
  conf_bucket:  gs-retail-awesome-conf-us-west-1
  data_bucket:  gs-retail-awesome-data-us-west-1
  model_bucket: gs-retail-awesome-model-us-west-1

# ── S3 경로 템플릿 ───────────────────────────────────────────
s3_paths:
  conf:  "{env}/{user_id}/{project}/{experiment}/"
  data:  "{env}/{user_id}/{project}/{version}/"
  model: "{env}/{user_id}/{project}/{experiment}/{run_id}/"

# ── 로컬 작업 디렉토리 ───────────────────────────────────────
local:
  root:       run_pm
  input_dir:  input
  output_dir: output
  output_subdirs:
    - metadata
    - config
    - data_refs
    - artifacts/model
    - artifacts/metrics
    - artifacts/charts
    - artifacts/explainability
    - reports
