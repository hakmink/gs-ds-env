# ============================================================
# input_data_ref.yml - 입력 데이터 참조
#
# 생성 시점  : 학습 실행 시 자동 생성
# 관리 주체  : 학습 파이프라인 (자동)
# S3 위치    : s3://gs-retail-awesome-model-{region}/
#               {env}/{user_id}/{project}/{experiment}/{run_id}/
#               data_refs/input_data_ref.yml
# ============================================================

# ── 데이터 소스 정보 ─────────────────────────────────────────
source:
  type:     s3
  bucket:   gs-retail-awesome-data-us-east-1
  prefix:   dev/sean/titanic-survival-prediction/v1.0/
  version:  v1.0
  origin:   Kaggle Titanic Competition

# ── 데이터 파일 목록 ─────────────────────────────────────────
files:
  data:
    - path: data/train.csv
      size_bytes: 61194
      row_count: 891
      checksum: sha256:titanic123abc...
      last_modified: '2025-03-05T10:00:00+09:00'

# ── 데이터 스키마 ────────────────────────────────────────────
schema:
  index_col: PassengerId
  target_col: Survived
  feature_count: 10
  
  columns:
    - name: PassengerId
      dtype: int64
      role: index
      
    - name: Survived
      dtype: int64
      role: target
      unique_values: [0, 1]
      distribution: {0: 549, 1: 342}
      
    - name: Pclass
      dtype: int64
      role: categorical
      unique_values: [1, 2, 3]
      
    - name: Name
      dtype: object
      role: dropped
      reason: high_cardinality
      
    - name: Sex
      dtype: object
      role: categorical
      unique_values: [male, female]
      distribution: {male: 577, female: 314}
      
    - name: Age
      dtype: float64
      role: numeric
      null_ratio: 0.199
      stats: {min: 0.42, max: 80.0, mean: 29.7, median: 28.0}
      
    - name: SibSp
      dtype: int64
      role: numeric
      stats: {min: 0, max: 8, mean: 0.52}
      
    - name: Parch
      dtype: int64
      role: numeric
      stats: {min: 0, max: 6, mean: 0.38}
      
    - name: Ticket
      dtype: object
      role: dropped
      reason: high_cardinality
      
    - name: Fare
      dtype: float64
      role: numeric
      null_ratio: 0.0
      stats: {min: 0.0, max: 512.33, mean: 32.2, median: 14.45}
      
    - name: Cabin
      dtype: object
      role: dropped
      reason: high_null_ratio
      null_ratio: 0.771
      
    - name: Embarked
      dtype: object
      role: categorical
      null_ratio: 0.002
      unique_values: [S, C, Q]
      distribution: {S: 644, C: 168, Q: 77}

# ── 데이터 분할 ──────────────────────────────────────────────
split:
  method: stratified_random
  train_ratio: 0.8
  valid_ratio: 0.2
  seed: 42
  
  train:
    samples: 712
    target_distribution: {0: 439, 1: 273}
  valid:
    samples: 179
    target_distribution: {0: 110, 1: 69}

# ── 데이터 품질 요약 ─────────────────────────────────────────
quality:
  total_rows:       891
  total_columns:    12
  used_features:    10
  dropped_columns:  3
  
  missing_values:
    Age:      177  # 19.9%
    Cabin:    687  # 77.1%
    Embarked: 2    # 0.2%
  
  class_balance:
    ratio: 1.60    # 549/342
    status: moderate_imbalance

# ── 파생 피처 ────────────────────────────────────────────────
derived_features:
  - name: FamilySize
    formula: SibSp + Parch + 1
    stats: {min: 1, max: 11, mean: 1.9}
    
  - name: IsAlone
    formula: 1 if FamilySize == 1 else 0
    distribution: {0: 354, 1: 537}
    
  - name: FarePerPerson
    formula: Fare / FamilySize
    stats: {min: 0.0, max: 512.33, mean: 24.8}
